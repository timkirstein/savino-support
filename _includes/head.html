<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if page.title %}{{ page.title }} · Savino{% else %}Savino Blogg{% endif %}</title>
  {% if page.description %}<meta name="description" content="{{ page.description }}" />{% endif %}
  <meta name="theme-color" content="#199978" />
  <meta property="og:type" content="article" />
  <meta property="og:site_name" content="Savino" />
  <meta property="og:title" content="{{ page.title }} · Savino" />
  {% if page.description %}<meta property="og:description" content="{{ page.description }}" />{% endif %}
  {% if page.hero.src %}<meta property="og:image" content="{{ page.hero.src | absolute_url }}" />{% endif %}
  <meta property="og:locale" content="nb_NO" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/main.css" />
</head>
