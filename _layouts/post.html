---
layout: default
---
<article class="blog-post">
  <div class="container">

    <div class="post-header">
      <a href="/blogg/" class="post-back">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" width="16" height="16">
          <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
        </svg>
        Alle artikler
      </a>
      <div class="post-meta">
        <time datetime="{{ page.date | date: '%Y-%m-%d' }}">{{ page.date_display | default: page.date | date: "%d.%m.%Y" }}</time>
        {% if page.category %}<span class="post-category">{{ page.category }}</span>{% endif %}
      </div>
      <h1>{{ page.title }}</h1>
      {% if page.description %}
      <p class="lead">{{ page.description }}</p>
      {% endif %}
    </div>

    <div class="post-content prose">
      {{ content }}
    </div>

    <div class="post-footer">
      <a href="/blogg/" class="btn btn-secondary">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" width="16" height="16">
          <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
        </svg>
        Tilbake til blogg
      </a>
    </div>

  </div>
</article>
